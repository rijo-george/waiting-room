name: WaitingRoom
options:
  bundleIdPrefix: com.waitingroom
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1,2"
    SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: false
    INFOPLIST_FILE: WaitingRoom/Info.plist
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    PRODUCT_BUNDLE_IDENTIFIER: com.rijo.waitingroom
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "K8383Q54VB"
    CODE_SIGN_STYLE: Automatic

targets:
  WaitingRoom:
    type: application
    platform: iOS
    sources:
      - path: WaitingRoom
    settings:
      base:
        PRODUCT_NAME: "The Waiting Room"
        INFOPLIST_FILE: WaitingRoom/Info.plist
        ASSETCATALOG_COMPILER_INCLUDE_ALL_APPICON_ASSETS: true
    entitlements:
      path: WaitingRoom/WaitingRoom.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.rijo.waitingroom
        com.apple.developer.icloud-container-identifiers:
          - iCloud.com.rijo.waitingroom
        com.apple.developer.icloud-services:
          - CloudDocuments
        com.apple.developer.ubiquity-container-identifiers:
          - iCloud.com.rijo.waitingroom

  WaitingRoomTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: WaitingRoomTests
    dependencies:
      - target: WaitingRoom
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rijo.waitingroom.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/The Waiting Room.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/The Waiting Room"
        BUNDLE_LOADER: "$(TEST_HOST)"
